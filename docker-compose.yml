services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-igotrend}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-igotrend}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-igotrend} -d ${POSTGRES_DB:-igotrend}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  api:
    image: ${DOCKER_REGISTRY:-docker.io}/${DOCKER_USERNAME}/igotrend-api:latest
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  web:
    image: ${DOCKER_REGISTRY:-docker.io}/${DOCKER_USERNAME}/igotrend-web:latest
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_started
    networks:
      - internal

volumes:
  postgres_data:

networks:
  internal:
    driver: bridge
